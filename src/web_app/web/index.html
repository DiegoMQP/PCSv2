<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="web_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PCS Access</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1C1C1E; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1C1C1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
    }
    #loading .title {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #loading .sub {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      margin-bottom: 40px;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(10,132,255,0.2);
      border-top-color: #0A84FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .status {
      margin-top: 16px;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    #loading .err {
      display: none;
      margin-top: 24px;
      color: #FF453A;
      font-size: 13px;
      text-align: center;
      padding: 0 32px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">PCS Access</div>
    <div class="sub">Control Residencial</div>
    <div class="spinner" id="load-spinner"></div>
    <div class="status" id="load-status">Iniciando...</div>
    <div class="err" id="load-err">Error al cargar la aplicación.<br>Intenta recargar la página.</div>
  </div>
  <script src="flutter_bootstrap.js"></script>
</body>
</html>

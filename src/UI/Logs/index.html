<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial de Accesos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --ios-text: #000000;
            --ios-search: #E3E3E8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .iphone-frame {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nav */
        .nav-header {
            padding: 50px 20px 10px;
            background: rgba(242, 242, 247, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            position: sticky;
            top: 0;
        }

        .nav-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .back-btn {
            color: var(--ios-blue);
            font-size: 17px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            width: 80px;
        }

        .page-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .nav-action {
            width: 80px;
            text-align: right;
            color: var(--ios-blue);
            font-size: 17px;
            cursor: pointer;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            margin-bottom: 10px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ios-gray);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            height: 36px;
            background: var(--ios-search);
            border: none;
            border-radius: 10px;
            padding: 0 35px;
            font-size: 17px;
            outline: none;
            color: var(--ios-text);
        }

        /* Log List */
        .log-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
        }

        .log-section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 20px 0 10px 4px;
            color: var(--ios-text);
        }

        .log-item {
            background: var(--ios-card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1px; /* Divider look */
            position: relative;
            opacity: 0;
            transform: translateY(10px);
        }

        .log-item:first-child {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .log-item:last-child {
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            margin-bottom: 20px;
        }

        .log-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .log-icon.entry {
            background: rgba(52, 199, 89, 0.15);
            color: var(--ios-green);
        }

        .log-icon.exit {
            background: rgba(142, 142, 147, 0.15);
            color: var(--ios-gray);
        }
        
        .log-icon.denied {
            background: rgba(255, 59, 48, 0.15);
            color: var(--ios-red);
        }

        .log-details {
            flex: 1;
        }

        .log-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .log-meta {
            font-size: 13px;
            color: var(--ios-gray);
        }

        .log-time {
            font-size: 14px;
            color: var(--ios-gray);
            font-weight: 500;
        }

    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="nav-header">
            <div class="nav-top">
                <a href="../index.html" class="back-btn">
                    <i class="fas fa-chevron-left"></i> Atrás
                </a>
                <div class="page-title">Historial</div>
                <div class="nav-action">Filtrar</div>
            </div>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Buscar">
            </div>
        </div>

        <div class="log-list">
            <div class="log-section-title">Hoy</div>
            <div class="log-group-today">
                <!-- Items injected by JS for demo -->
                <div class="log-item">
                    <div class="log-icon entry">
                        <i class="fas fa-arrow-right-to-bracket"></i>
                    </div>
                    <div class="log-details">
                        <div class="log-name">Juan Pérez</div>
                        <div class="log-meta">Visita • Placa: ABC-123</div>
                    </div>
                    <div class="log-time">14:30</div>
                </div>
                
                <div class="log-item">
                    <div class="log-icon exit">
                        <i class="fas fa-arrow-right-from-bracket"></i>
                    </div>
                    <div class="log-details">
                        <div class="log-name">Juan Pérez</div>
                        <div class="log-meta">Salida</div>
                    </div>
                    <div class="log-time">12:15</div>
                </div>

                <div class="log-item">
                    <div class="log-icon denied">
                        <i class="fas fa-ban"></i>
                    </div>
                    <div class="log-details">
                        <div class="log-name">Desconocido</div>
                        <div class="log-meta">Código inválido</div>
                    </div>
                    <div class="log-time">10:05</div>
                </div>
            </div>

            <div class="log-section-title">Ayer</div>
            <div class="log-group-yesterday">
                <div class="log-item">
                    <div class="log-icon entry">
                        <i class="fas fa-truck"></i>
                    </div>
                    <div class="log-details">
                        <div class="log-name">Paquetería Amazon</div>
                        <div class="log-meta">Servicio • Entrada</div>
                    </div>
                    <div class="log-time">16:45</div>
                </div>
                 <div class="log-item">
                    <div class="log-icon entry">
                        <i class="fas fa-user-friends"></i>
                    </div>
                    <div class="log-details">
                        <div class="log-name">Familia Rodríguez</div>
                        <div class="log-meta">Visita • Código 8842</div>
                    </div>
                    <div class="log-time">09:30</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const tl = gsap.timeline();

             // Header Animation
             tl.from('.nav-header', { y: -20, opacity: 0, duration: 0.4 });

             // List Items Animation (Staggered)
             tl.to('.log-item', {
                 opacity: 1,
                 y: 0,
                 duration: 0.5,
                 stagger: 0.1,
                 ease: "power2.out"
             }, "-=0.2");

             // Search interaction (Simple visual effect)
             const searchInput = document.querySelector('.search-input');
             searchInput.addEventListener('focus', () => {
                 gsap.to('.search-container', { scale: 1.02, duration: 0.2 });
             });
             searchInput.addEventListener('blur', () => {
                 gsap.to('.search-container', { scale: 1, duration: 0.2 });
             });
        });
    </script>
</body>
</html>

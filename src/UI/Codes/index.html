<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Códigos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-orange: #FF9500;
            --ios-green: #34C759;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .iphone-frame {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nav */
        .nav-header {
            padding: 50px 20px 15px;
            background: rgba(242, 242, 247, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--ios-blue);
            font-size: 17px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            width: 80px;
        }

        .page-title {
            font-size: 17px;
            font-weight: 600;
        }

        .nav-right {
            width: 80px;
            text-align: right;
            color: var(--ios-blue);
            font-size: 17px;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section-label {
            color: var(--ios-gray);
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .code-card {
            background: var(--ios-card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .guest-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .guest-info p {
            font-size: 14px;
            color: var(--ios-gray);
        }

        .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(52, 199, 89, 0.1);
            color: var(--ios-green);
        }

        .status-badge.expiring {
            background: rgba(255, 149, 0, 0.1);
            color: var(--ios-orange);
        }

        .code-display {
            background: #F2F2F7;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .access-code {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 3px;
            font-family: monospace; /* Monospace for numbers */
        }

        .countdown {
            margin-top: 5px;
            font-size: 13px;
            color: var(--ios-red);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-share {
            background: var(--ios-blue);
            color: white;
        }

        .btn-revoke {
            background: #ffe5e5;
            color: var(--ios-red);
        }

        /* Progress Ring for expiring visual */
        .progress-ring {
            position: relative;
            width: 40px;
            height: 40px;
        }
        
        .progress-ring svg {
            transform: rotate(-90deg);
        }

    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="nav-header">
            <a href="../index.html" class="back-btn">
                <i class="fas fa-chevron-left"></i> Atrás
            </a>
            <div class="page-title">Mis Códigos</div>
            <div class="nav-right">
                <i class="fas fa-plus"></i>
            </div>
        </div>

        <div class="content">
            <div class="section-label">Activos Ahora</div>
            
            <!-- Code Card 1 -->
            <div class="code-card">
                <div class="card-header">
                    <div class="guest-info">
                        <h3>Familia Rodríguez</h3>
                        <p>Visita General</p>
                    </div>
                    <div class="status-badge">Activo</div>
                </div>
                
                <div class="code-display">
                    <span class="access-code">8842</span>
                </div>

                <div class="countdown">
                    <i class="far fa-clock"></i> Expira en 3h 45m
                </div>

                <div class="card-actions" style="margin-top: 15px;">
                    <button class="btn-action btn-share">
                        <i class="fas fa-share-square"></i> Compartir
                    </button>
                    <button class="btn-action btn-revoke" onclick="revokeCode(this)">
                        <i class="fas fa-ban"></i> Revocar
                    </button>
                </div>
            </div>

            <div class="section-label" style="margin-top: 20px;">Próximos a vencer</div>

            <!-- Code Card 2 -->
            <div class="code-card">
                <div class="card-header">
                    <div class="guest-info">
                        <h3>Uber Eats</h3>
                        <p>Entrega de Comida</p>
                    </div>
                    <div class="status-badge expiring">Expira pronto</div>
                </div>
                
                <div class="code-display">
                    <span class="access-code">9021</span>
                </div>

                <div class="countdown" style="color: var(--ios-red);">
                    <i class="fas fa-stopwatch"></i> Expira en 12m 30s
                </div>

                <div class="card-actions" style="margin-top: 15px;">
                    <button class="btn-action btn-share">
                        <i class="fas fa-share-square"></i> Compartir
                    </button>
                    <button class="btn-action btn-revoke" onclick="revokeCode(this)">
                        <i class="fas fa-ban"></i> Revocar
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            
            tl.from('.nav-header', { y: -20, opacity: 0, duration: 0.4 })
              .to('.code-card', {
                opacity: 1,
                y: 0,
                duration: 0.5,
                stagger: 0.15,
                ease: "power2.out"
            }, "-=0.2");
        });

        function revokeCode(btn) {
            // Find the parent card
            const card = btn.closest('.code-card');
            
            // Confirm dialog style (simple confirm for now)
            if(confirm("¿Estás seguro de que deseas revocar este código? Dejará de funcionar inmediatamente.")) {
                gsap.to(card, {
                    scale: 0.9,
                    opacity: 0,
                    height: 0,
                    marginBottom: 0,
                    padding: 0,
                    duration: 0.5,
                    ease: "power2.inOut",
                    onComplete: () => card.remove()
                });
            }
        }
    </script>
</body>
</html>

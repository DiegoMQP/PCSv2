<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
            --ios-separator: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .iphone-frame {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 50px 20px 20px;
            background: rgba(242, 242, 247, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .page-title {
            font-size: 34px;
            font-weight: 700;
        }

        .content {
            flex: 1;
            padding: 0 16px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        /* Profile Card */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--ios-card);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 60px; 
            height: 60px;
            background: #E5E5EA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--ios-gray);
        }
        
        .user-info h2 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-info p {
            color: var(--ios-gray);
            font-size: 14px;
        }

        .edit-btn {
            margin-left: auto;
            color: var(--ios-blue);
            font-size: 14px;
            cursor: pointer;
        }

        /* Settings List */
        .settings-group {
            background: var(--ios-card);
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .setting-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            cursor: pointer;
            transition: background 0.2s;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item:active {
            background: #E5E5EA;
        }

        .setting-icon {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 12px;
            font-size: 14px;
        }

        .setting-label {
            flex: 1;
            font-size: 16px;
        }

        .setting-value {
            color: var(--ios-gray);
            font-size: 16px;
            margin-right: 8px;
        }

        /* Switch */
        .switch {
            width: 50px;
            height: 30px;
            background: #34C759;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
        }
        
        .switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .footer-action {
            text-align: center;
            margin-top: 10px;
        }
        
        .logout-btn {
            color: var(--ios-red);
            background: var(--ios-card);
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 15px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--ios-gray);
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            width: 60px;
        }

        .nav-item.active {
            color: var(--ios-blue);
        }

        .nav-item i {
            font-size: 24px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 135px;
            height: 5px;
            background: #000;
            border-radius: 3px;
            opacity: 0.2;
        }

    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="header">
            <div class="page-title">Perfil</div>
        </div>

        <div class="content">
            <div class="profile-card">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-info">
                    <h2>Diego</h2>
                    <p>diego@example.com</p>
                </div>
                <div class="edit-btn">Editar</div>
            </div>

            <div class="settings-group">
                <div class="setting-item">
                    <div class="setting-icon" style="background: #007AFF;">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <span class="setting-label">Contraseña y Seguridad</span>
                    <i class="fas fa-chevron-right" style="color: #C7C7CC; font-size: 14px;"></i>
                </div>
                <div class="setting-item">
                    <div class="setting-icon" style="background: #FF2D55;">
                        <i class="fas fa-bell"></i>
                    </div>
                    <span class="setting-label">Notificaciones</span>
                    <i class="fas fa-chevron-right" style="color: #C7C7CC; font-size: 14px;"></i>
                </div>
                <div class="setting-item">
                    <div class="setting-icon" style="background: #5856D6;">
                        <i class="fas fa-moon"></i>
                    </div>
                    <span class="setting-label">Modo Oscuro</span>
                    <div class="switch"></div>
                </div>
            </div>

            <div class="settings-group">
                <div class="setting-item">
                    <div class="setting-icon" style="background: #8E8E93;">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <span class="setting-label">Ayuda y Soporte</span>
                    <i class="fas fa-chevron-right" style="color: #C7C7CC; font-size: 14px;"></i>
                </div>
            </div>

            <div class="footer-action">
                <button class="logout-btn" onclick="window.location.href='../Login/index.html'">Cerrar Sesión</button>
                <div style="font-size: 12px; color: #C7C7CC; margin-top: 15px;">PCS Versión 1.0.2</div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="../Alerts/index.html" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Alertas</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>Perfil</span>
            </a>
            <div class="home-indicator"></div>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const tl = gsap.timeline();
             tl.from('.profile-card', { opacity: 0, y: 20, duration: 0.5 })
               .from('.settings-group', { opacity: 0, y: 20, duration: 0.5, stagger: 0.1 }, "-=0.3");

            // Switch interaction
            document.querySelector('.switch').addEventListener('click', function() {
                this.classList.toggle('active'); // In a real app we would change colors
                // Visual feedback only
                const isActive = this.style.backgroundColor === 'rgb(229, 229, 234)';
                if(isActive) {
                    this.style.backgroundColor = '#34C759';
                    gsap.to(this.querySelector('::after'), { x: 0, duration: 0.2 });
                } else {
                    // This is handled by CSS mostly, but for GSAP we could animate toggle
                }
            });
        });
    </script>
</body>
</html>

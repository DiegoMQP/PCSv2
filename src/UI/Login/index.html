<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PCS Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-field: #F2F2F7;
            --ios-blue: #007AFF;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000; /* Dark outer bg for contrast */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .iphone-frame {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
        }

        .login-header {
            margin-top: 60px;
            margin-bottom: 40px;
            text-align: center;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            background: var(--ios-blue);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            opacity: 0;
            transform: scale(0.5);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(20px);
        }

        p {
            color: var(--ios-gray);
            font-size: 16px;
            opacity: 0;
            transform: translateY(20px);
        }

        .input-group {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(20px);
        }

        input {
            width: 100%;
            height: 56px;
            background: var(--ios-field);
            border: none;
            border-radius: 14px;
            padding: 0 20px;
            font-size: 17px;
            color: var(--ios-text);
            outline: none;
            transition: background 0.2s;
        }

        input:focus {
            background: #E5E5EA;
        }

        .login-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            width: 100%;
            height: 56px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            opacity: 0; /* Hidden by default */
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Visible state for button */
        .login-btn.visible {
            opacity: 1 !important; /* Override GSAP opacity if needed after load */
            transform: scale(1);
            pointer-events: all;
        }
        
        .login-btn.hidden {
            display: none; 
        }

        .footer-links {
            margin-top: auto;
            text-align: center;
            opacity: 0;
        }

        .link {
            color: var(--ios-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="login-header">
      
            <h1>Bienvenido</h1>
            <p>Ingresa para continuar</p>
        </div>

        <form id="loginForm" onsubmit="return false">
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo Electrónico" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            
            <button type="button" id="submitBtn" class="login-btn hidden" onclick="window.location.href='../index.html'">
                Iniciar Sesión
            </button>
        </form>

        <div class="footer-links">
            <a href="../Register/index.html" class="link">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Intro Animation
            const tl = gsap.timeline();
            
            tl.to('.app-logo', { opacity: 1, scale: 1, duration: 0.8, ease: "elastic.out(1, 0.5)" })
              .to('h1', { opacity: 1, y: 0, duration: 0.5 }, "-=0.4")
              .to('p', { opacity: 1, y: 0, duration: 0.5 }, "-=0.3")
              .to('.input-group', { opacity: 1, y: 0, duration: 0.5, stagger: 0.1 }, "-=0.2")
              .to('.footer-links', { opacity: 1, duration: 0.5 }, "-=0.1");

            // Input Logic
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const btn = document.getElementById('submitBtn');

            function checkInputs() {
                if(email.value.length > 0 && password.value.length > 0) {
                    if (btn.classList.contains('hidden')) {
                         btn.classList.remove('hidden');
                         gsap.fromTo(btn, 
                            { opacity: 0, y: 20 }, 
                            { opacity: 1, y: 0, duration: 0.4, ease: "back.out(1.7)" }
                        );
                    }
                } else {
                    if (!btn.classList.contains('hidden')) {
                        gsap.to(btn, { opacity: 0, y: 20, duration: 0.3, onComplete: () => btn.classList.add('hidden') });
                    }
                }
            }

            email.addEventListener('input', checkInputs);
            password.addEventListener('input', checkInputs);
        });
    </script>
</body>
</html>

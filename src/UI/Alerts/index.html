<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alertas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text: #000000;
            --ios-gray: #8E8E93;
            --ios-separator: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .iphone-frame {
            width: 100%;
            height: 100%;
            max-width: 430px;
            background: var(--ios-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 50px 20px 15px;
            background: rgba(242, 242, 247, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 34px;
            font-weight: 700;
        }

        .mark-read {
            color: var(--ios-blue);
            font-size: 17px;
            cursor: pointer;
        }

        .content {
            flex: 1;
            padding: 0 16px;
            overflow-y: auto;
            padding-bottom: 100px; /* Space for bottom nav */
        }

        .alert-group {
            margin-top: 20px;
        }

        .group-title {
            font-size: 13px;
            color: var(--ios-gray);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-left: 10px;
        }

        .alert-item {
            background: var(--ios-card);
            border-bottom: 0.5px solid var(--ios-separator);
            padding: 15px;
            display: flex;
            gap: 15px;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
        }

        .alert-item:first-child {
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        
        .alert-item:last-child {
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            border-bottom: none;
        }

        .alert-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        /* Alert Types */
        .type-security {
            background: rgba(255, 59, 48, 0.15);
            color: var(--ios-red);
        }

        .type-info {
            background: rgba(0, 122, 255, 0.15);
            color: var(--ios-blue);
        }

        .type-system {
            background: rgba(142, 142, 147, 0.15);
            color: var(--ios-gray);
        }

        .alert-content {
            flex: 1;
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .alert-title {
            font-weight: 600;
            font-size: 16px;
        }

        .alert-time {
            font-size: 13px;
            color: var(--ios-gray);
        }

        .alert-msg {
            font-size: 14px;
            color: var(--ios-gray);
            line-height: 1.4;
        }

        .unread-dot {
            width: 10px;
            height: 10px;
            background: var(--ios-blue);
            border-radius: 50%;
            position: absolute;
            top: 20px;
            right: 15px;
        }

        /* Bottom Nav (Consistent) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 15px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--ios-gray);
            font-size: 10px;
            font-weight: 500;
            text-decoration: none;
            width: 60px;
        }

        .nav-item.active {
            color: var(--ios-blue);
        }

        .nav-item i {
            font-size: 24px;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 135px;
            height: 5px;
            background: #000;
            border-radius: 3px;
            opacity: 0.2;
        }

    </style>
</head>
<body>
    <div class="iphone-frame">
        <div class="header">
            <div class="page-title">Alertas</div>
            <div class="mark-read">Leído</div>
        </div>

        <div class="content">
            <div class="alert-group">
                <div class="group-title">Nuevas</div>
                
                <div class="alert-item">
                    <div class="alert-icon type-security">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-title">Intento de Acceso</span>
                            <span class="alert-time">Hace 5m</span>
                        </div>
                        <p class="alert-msg">Código #9921 ingresado incorrectamente 3 veces.</p>
                    </div>
                    <div class="unread-dot"></div>
                </div>

                <div class="alert-item">
                    <div class="alert-icon type-info">
                        <i class="fas fa-bullhorn"></i>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-title">Mantenimiento</span>
                            <span class="alert-time">Hace 1h</span>
                        </div>
                        <p class="alert-msg">El portón principal estará en mantenimiento hoy de 3pm a 5pm.</p>
                    </div>
                    <div class="unread-dot"></div>
                </div>
            </div>

            <div class="alert-group">
                <div class="group-title">Esta semana</div>
                
                <div class="alert-item">
                    <div class="alert-icon type-system">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-title">Sistema Actualizado</span>
                            <span class="alert-time">Ayer</span>
                        </div>
                        <p class="alert-msg">La validación de códigos QR ha sido mejorada.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-bell"></i>
                <span>Alertas</span>
            </a>
            <a href="../Profile/index.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Perfil</span>
            </a>
            <div class="home-indicator"></div>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const tl = gsap.timeline();
             tl.to('.alert-item', { opacity: 1, y: 0, duration: 0.5, stagger: 0.1 });
             
             // Mark as read interaction
             document.querySelector('.mark-read').addEventListener('click', () => {
                 gsap.to('.unread-dot', { scale: 0, opacity: 0, duration: 0.3 });
             });
        });
    </script>
</body>
</html>
